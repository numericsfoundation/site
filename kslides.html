<!doctype html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson Tiles</title>

<style>

body{
margin:0;
padding:40px;
font-family:Trebuchet MS, Verdana, Arial, sans-serif;
background:#f2f2f2;
}

.canvasGrid{
display:grid;
grid-template-columns:repeat(5, 1fr);
gap:20px;
max-width:1100px;
margin:auto;
}

.canvasBox{
border:2px solid #bdbdbd;
border-radius:14px;
box-shadow:0 6px 12px rgba(0,0,0,0.15);
height:130px;
background:#ffffff;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:#1f3a60;
font-size:20px;
font-weight:700;
text-shadow:1px 1px 2px rgba(0,0,0,0.15);
padding:10px;
}

</style>
</head>

<body>

<div class="canvasGrid">

<div class="canvasBox">Knowing One</div>
<div class="canvasBox">Knowing Two</div>
<div class="canvasBox">Knowing Three</div>
<div class="canvasBox">Knowing Four</div>
<div class="canvasBox">Knowing Five</div>

<div class="canvasBox">Building One to Five</div>
<div class="canvasBox">Knowing Six</div>
<div class="canvasBox">Building Six</div>
<div class="canvasBox">Knowing Seven</div>
<div class="canvasBox">Building Seven</div>

<div class="canvasBox">Knowing Eight</div>
<div class="canvasBox">Building Eight</div>
<div class="canvasBox">Knowing Nine</div>
<div class="canvasBox">Building Nine</div>
<div class="canvasBox">Knowing Ten</div>

<div class="canvasBox">Building Ten</div>

</div>

</body>

</html>
